<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MODO Attendance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
  :root {
    --primary: #1d4ed8;
    --primary-light: #3b82f6;
    --primary-dark: #1e3a8a;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

  /* ─── PAGES ─── */
  .page { display: none; }
  .page.active { display: flex; }

  /* LOGIN */
  #page-login { align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 60%, #3b82f6 100%); }
  .login-card { background: #fff; border-radius: 16px; padding: 48px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 400px; width: 100%; }
  .login-logo { font-size: 48px; margin-bottom: 16px; }
  .login-card h1 { font-size: 24px; font-weight: 700; color: var(--primary-dark); margin-bottom: 4px; }
  .login-card p { color: var(--gray-500); font-size: 14px; margin-bottom: 32px; }
  .btn-ms { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 14px 24px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; }
  .btn-ms:hover { background: var(--primary-dark); }
  .btn-ms svg { width: 20px; height: 20px; }

  /* LOADING */
  #page-loading { align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 4px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* APP SHELL */
  #page-app { flex-direction: column; min-height: 100vh; }
  header { background: var(--primary-dark); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .user-badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; }
  .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }
  main { flex: 1; padding: 24px; max-width: 1200px; width: 100%; margin: 0 auto; }

  /* CARDS */
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid var(--gray-200); }
  .card-sm { padding: 16px 20px; }

  /* AGENT VIEW */
  .agent-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 600px) { .agent-hero { grid-template-columns: 1fr; } }
  .schedule-card { grid-column: 1; }
  .action-card { grid-column: 2; display: flex; flex-direction: column; justify-content: center; }
  @media (max-width: 600px) { .schedule-card, .action-card { grid-column: 1; } }

  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-500); margin-bottom: 6px; }
  .shift-time { font-size: 32px; font-weight: 700; color: var(--primary); margin: 8px 0; }
  .shift-off { font-size: 32px; font-weight: 700; color: var(--gray-500); margin: 8px 0; }
  .date-display { font-size: 15px; color: var(--gray-700); }

  .status-chip { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 600; margin-top: 12px; }
  .status-chip.on-time { background: #dcfce7; color: var(--success); }
  .status-chip.late { background: #fef3c7; color: var(--warning); }
  .status-chip.absent { background: #fee2e2; color: var(--danger); }
  .status-chip.off { background: var(--gray-100); color: var(--gray-500); }
  .status-chip.pending { background: #eff6ff; color: var(--primary); }
  .status-chip::before { content: '●'; font-size: 8px; }

  .btn-checkin { background: var(--success); color: #fff; border: none; border-radius: 10px; padding: 16px 32px; font-size: 18px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn-checkin:hover { opacity: 0.9; }
  .btn-checkout { background: var(--warning); color: #fff; border: none; border-radius: 10px; padding: 16px 32px; font-size: 18px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn-checkout:hover { opacity: 0.9; }
  .btn-disabled { background: var(--gray-200); color: var(--gray-500); border: none; border-radius: 10px; padding: 16px 32px; font-size: 18px; font-weight: 700; width: 100%; cursor: default; }

  .time-row { display: flex; gap: 16px; margin-top: 16px; }
  .time-box { flex: 1; background: var(--gray-50); border-radius: 8px; padding: 12px; border: 1px solid var(--gray-200); }
  .time-box .val { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-top: 4px; }

  /* WEEK SCHEDULE */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 8px; }
  .day-cell { border-radius: 8px; padding: 8px; text-align: center; background: var(--gray-50); border: 1px solid var(--gray-200); }
  .day-cell.today { background: #eff6ff; border-color: var(--primary-light); }
  .day-cell.off-day { opacity: 0.5; }
  .day-cell .day-name { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; }
  .day-cell .day-date { font-size: 13px; font-weight: 700; margin: 2px 0; }
  .day-cell .day-shift { font-size: 10px; color: var(--primary); font-weight: 600; }
  .day-cell.off-day .day-shift { color: var(--gray-500); }

  /* LEADER VIEW */
  .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }

  .summary-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid var(--gray-200); text-align: center; }
  .summary-card .num { font-size: 36px; font-weight: 800; }
  .summary-card .lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-top: 4px; }
  .num.blue { color: var(--primary); }
  .num.green { color: var(--success); }
  .num.yellow { color: var(--warning); }
  .num.red { color: var(--danger); }
  .num.gray { color: var(--gray-500); }

  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .controls select, .controls input[type="date"] { border: 1px solid var(--gray-300); border-radius: 8px; padding: 8px 12px; font-size: 14px; color: var(--gray-700); background: #fff; outline: none; }
  .controls select:focus, .controls input[type="date"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th { background: var(--gray-50); border-bottom: 2px solid var(--gray-200); padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.15s; }
  tbody tr:hover { background: var(--gray-50); }
  tbody td { padding: 12px 14px; color: var(--gray-700); white-space: nowrap; }
  .td-name { font-weight: 600; color: var(--gray-900); }
  .td-manager { font-size: 12px; color: var(--gray-500); }
  .badge { display: inline-block; border-radius: 12px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
  .badge.on-time { background: #dcfce7; color: var(--success); }
  .badge.late { background: #fef3c7; color: var(--warning); }
  .badge.absent { background: #fee2e2; color: var(--danger); }
  .badge.off { background: var(--gray-100); color: var(--gray-500); }
  .badge.pto { background: #f3e8ff; color: #7c3aed; }
  .badge.pending { background: #eff6ff; color: var(--primary); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-900); color: #fff; border-radius: 10px; padding: 14px 20px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 9999; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  .section-title { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 16px; }
  .tab-bar { display: flex; gap: 4px; background: var(--gray-100); border-radius: 10px; padding: 4px; margin-bottom: 24px; width: fit-content; }
  .tab-btn { border: none; background: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--gray-500); cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: #fff; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .refresh-btn { margin-left: auto; background: none; border: 1px solid var(--gray-300); border-radius: 8px; padding: 8px 14px; font-size: 13px; color: var(--gray-600); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { background: var(--gray-100); }
  .empty-state { text-align: center; padding: 48px; color: var(--gray-500); }
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">📋</div>
    <h1>MODO Attendance</h1>
    <p>Sign in with your Conduet Microsoft account to continue</p>
    <button class="btn-ms" onclick="signIn()">
      <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>
  </div>
</div>

<!-- ─── LOADING ─── -->
<div id="page-loading" class="page">
  <div class="spinner"></div>
  <p style="color:var(--gray-500); font-size:15px;" id="loading-msg">Loading your schedule…</p>
</div>

<!-- ─── APP ─── -->
<div id="page-app" class="page">
  <header>
    <h1>📋 MODO Attendance</h1>
    <div class="header-right">
      <span class="user-badge" id="header-name">—</span>
      <button class="btn-logout" onclick="signOut()">Sign Out</button>
    </div>
  </header>
  <main>
    <!-- AGENT VIEW -->
    <div id="view-agent" style="display:none">
      <div class="agent-hero">
        <div class="card schedule-card">
          <div class="label">Today's Shift</div>
          <div id="agent-date" class="date-display"></div>
          <div id="agent-shift" class="shift-time">—</div>
          <div id="agent-status"></div>
        </div>
        <div class="card action-card" id="agent-action-card">
          <div id="agent-action-content" style="text-align:center;"></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:24px;">
        <div class="label" style="margin-bottom:12px;">This Week's Schedule</div>
        <div class="week-grid" id="agent-week-grid"></div>
      </div>
    </div>

    <!-- LEADER VIEW -->
    <div id="view-leader" style="display:none">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="setTab('today')" id="tab-today">Today's Attendance</button>
        <button class="tab-btn" onclick="setTab('week')" id="tab-week">Weekly Schedule</button>
      </div>

      <!-- TODAY TAB -->
      <div id="leader-today">
        <div class="controls">
          <input type="date" id="leader-date" onchange="leaderRefresh()" />
          <select id="leader-filter" onchange="leaderRefresh()">
            <option value="">All Teams</option>
          </select>
          <button class="refresh-btn" onclick="leaderRefresh()">↻ Refresh</button>
        </div>
        <div class="summary-grid" id="leader-summary"></div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Agent</th>
                  <th>EID</th>
                  <th>Line Manager</th>
                  <th>Scheduled Shift</th>
                  <th>Check-In</th>
                  <th>Check-Out</th>
                  <th>Status</th>
                  <th>Late (min)</th>
                </tr>
              </thead>
              <tbody id="leader-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- WEEK TAB -->
      <div id="leader-week" style="display:none">
        <div class="card">
          <div class="table-wrap">
            <table id="week-table">
              <thead id="week-thead"></thead>
              <tbody id="week-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   ██████╗ ██████╗ ███╗   ██╗███████╗██╗ ██████╗
  ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
  ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
  ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
  ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
   ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
   ════════════════════════════════════════════════
   ▶ SETUP — Fill in these values before deploying
   ════════════════════════════════════════════════ */
const CONFIG = {
  // ① Azure AD App Registration
  clientId:  '7dfd41b7-1960-49c6-a701-b021a28550bb',
  tenantId:  '3acfc3b8-ea64-4ce1-8910-f91e9c67a3fc',
  redirectUri: window.location.href.split('?')[0].split('#')[0], // auto-detected

  // ② SharePoint / Excel file
  spHostname:  'conduetcx.sharepoint.com',
  spSitePath:  '/sites/WFMTeam',
  excelPath:   'MODO Files/MODO_Attendance_Schedule_v2.xlsx',   // path inside Shared Documents

  // ③ Role definitions — add emails of leaders here
  clusterHeads: [
    'john.dolliente@conduet.com',   // Nix — sees all agents
    // add more cluster-level users if needed
  ],
  lineManagers: [
    'kirk.moncay@conduet.com',
    'joshua.castillo@conduet.com',
    'nicole.domingo@conduet.com',
    'nabil.libacao@conduet.cx',
  ],
  // Line manager display names (must match "Line Manager" column in Excel exactly)
  lineManagerNames: {
    'kirk.moncay@conduet.com':     'Kirk Moncay',
    'joshua.castillo@conduet.com': 'Joshua Castillo',
    'nicole.domingo@conduet.com':  'Nicole Domingo',
    'nabil.libacao@conduet.cx':    'Nabil Rosario Libacao',
  },
};
/* ════════════════════════════════════════════════ */

// ─── MSAL SETUP ───────────────────────────────────
const SCOPES = ['User.Read', 'Files.ReadWrite.All', 'Sites.ReadWrite.All'];
let msalInstance = null; // initialized lazily on first use

function getMsalInstance() {
  if (msalInstance) return msalInstance;
  if (CONFIG.clientId === 'YOUR_CLIENT_ID_HERE' || CONFIG.tenantId === 'YOUR_TENANT_ID_HERE') {
    throw new Error('Please open the HTML file in a text editor and fill in your Azure AD clientId and tenantId in the CONFIG section at the top of the script.');
  }
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CONFIG.clientId,
      authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
      redirectUri: CONFIG.redirectUri,
    },
    cache: { cacheLocation: 'sessionStorage' },
  });
  return msalInstance;
}

let currentUser = null;  // { email, name, role, managerName }
let scheduleData = [];   // rows from Schedule_Raw
let checkinData = [];    // rows from CheckIn_CheckOut
let siteId = null;
let driveId = null;
let fileId = null;
let schedDateCols = [];  // [{label: '25-May', colIndex: 6}, ...]
let checkinHeaders = [];

// ─── AUTH ──────────────────────────────────────────
async function signIn() {
  try {
    const inst = getMsalInstance();
    await inst.initialize();
    const result = await inst.loginPopup({ scopes: SCOPES });
    inst.setActiveAccount(result.account);
    await initApp();
  } catch(e) {
    showToast('Sign-in failed: ' + e.message, 'error');
  }
}

function signOut() {
  getMsalInstance().logoutPopup();
  location.reload();
}

async function getToken() {
  const inst = getMsalInstance();
  const account = inst.getActiveAccount() || inst.getAllAccounts()[0];
  if (!account) throw new Error('Not signed in');
  const result = await inst.acquireTokenSilent({ scopes: SCOPES, account });
  return result.accessToken;
}

// ─── GRAPH API ────────────────────────────────────
async function graph(path, method='GET', body=null) {
  const token = await getToken();
  const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Graph ${method} ${path}: ${res.status} — ${err}`);
  }
  if (method === 'GET') return res.json();
  return res;
}

async function ensureFileIds() {
  if (fileId) return;
  setLoading('Connecting to SharePoint…');
  const siteRes = await graph(`/sites/${CONFIG.spHostname}:${CONFIG.spSitePath}`);
  siteId = siteRes.id;
  const driveRes = await graph(`/sites/${siteId}/drive`);
  driveId = driveRes.id;
  const fileRes = await graph(`/drives/${driveId}/root:/${CONFIG.excelPath}`);
  fileId = fileRes.id;
}

function wbPath(sub) {
  return `/drives/${driveId}/items/${fileId}/workbook${sub}`;
}

async function readSheet(sheetName) {
  await ensureFileIds();
  const res = await graph(wbPath(`/worksheets/${encodeURIComponent(sheetName)}/usedRange(valuesOnly=true)`));
  if (!res.values || res.values.length < 2) return { headers: [], rows: [] };
  const [headers, ...rawRows] = res.values;
  const rows = rawRows.map(r => Object.fromEntries(headers.map((h,i) => [h, r[i] ?? ''])));
  return { headers, rows };
}

async function appendRowToSheet(sheetName, headers, rowValues) {
  await ensureFileIds();
  const usedRes = await graph(wbPath(`/worksheets/${encodeURIComponent(sheetName)}/usedRange(valuesOnly=true)`));
  const nextRow = (usedRes.values ? usedRes.values.length : 1) + 1;
  const endCol = colLetter(headers.length);
  await graph(
    wbPath(`/worksheets/${encodeURIComponent(sheetName)}/range(address='A${nextRow}:${endCol}${nextRow}')`),
    'PATCH',
    { values: [rowValues] }
  );
  return nextRow;
}

async function updateSheetCell(sheetName, rowNum, colNum, value) {
  await ensureFileIds();
  const col = colLetter(colNum);
  await graph(
    wbPath(`/worksheets/${encodeURIComponent(sheetName)}/range(address='${col}${rowNum}:${col}${rowNum}')`),
    'PATCH',
    { values: [[value]] }
  );
}

function colLetter(n) {
  // 1-indexed: 1=A, 26=Z, 27=AA
  let s = '';
  while (n > 0) {
    const r = (n - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

// ─── APP INIT ─────────────────────────────────────
async function initApp() {
  showPage('loading');
  try {
    // Get user profile
    const me = await graph('/me');
    const email = (me.mail || me.userPrincipalName || '').toLowerCase();
    const name = me.displayName || email;

    let role = 'agent';
    let managerName = null;
    if (CONFIG.clusterHeads.map(e=>e.toLowerCase()).includes(email)) {
      role = 'cluster_head';
    } else if (CONFIG.lineManagers.map(e=>e.toLowerCase()).includes(email)) {
      role = 'manager';
      managerName = CONFIG.lineManagerNames[email] || name;
    }

    currentUser = { email, name, role, managerName };
    document.getElementById('header-name').textContent = name;

    // Load schedule data
    setLoading('Loading schedule data…');
    const schedRes = await readSheet('Schedule_Raw');
    scheduleData = schedRes.rows;
    // Parse date columns (indices 6 onward)
    schedDateCols = schedRes.headers.slice(6).map((h, i) => ({ label: h, colIndex: i + 6 }));

    // Load check-in data
    setLoading('Loading attendance records…');
    const ciRes = await readSheet('CheckIn_CheckOut');
    checkinData = ciRes.rows;
    checkinHeaders = ciRes.headers;

    showPage('app');
    if (role === 'agent') renderAgentView();
    else renderLeaderView();
  } catch(e) {
    showPage('login');
    showToast('Error loading app: ' + e.message, 'error');
    console.error(e);
  }
}

// ─── UTILITIES ────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}
function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  showPage('loading');
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function todayStr() {
  return new Date().toISOString().slice(0,10); // YYYY-MM-DD
}
function fmtTime(d) {
  return d.toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit', hour12: true });
}
function fmtDate(d) {
  return d.toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

// Match today's date to the column header (e.g. "29-May")
function getTodayColLabel() {
  const now = new Date();
  const day = now.getDate();
  const mon = now.toLocaleString('en-US', { month: 'short' }); // "May"
  return `${day}-${mon}`; // "29-May"
}

function getScheduleForUser(email, dateLabel) {
  const row = scheduleData.find(r => (r.Email||'').toLowerCase() === email.toLowerCase());
  if (!row) return null;
  return { shift: row[dateLabel] || 'OFF', row };
}

function parseShift(shiftStr) {
  if (!shiftStr || shiftStr === 'OFF' || shiftStr === 'PTO') return null;
  const [start, end] = shiftStr.split(' - ').map(t => t.trim());
  return { start, end };
}

function calcLateMinutes(checkInTime, shiftStart) {
  // checkInTime & shiftStart are "HH:MM" strings
  const [ch, cm] = checkInTime.split(':').map(Number);
  const [sh, sm] = shiftStart.split(':').map(Number);
  const ciMins = ch * 60 + cm;
  const ssMins = sh * 60 + sm;
  return Math.max(0, ciMins - ssMins);
}

function uniqueKey(email, dateStr) {
  return `${email}_${dateStr}`;
}

function findCheckinRow(email, dateStr) {
  const key = uniqueKey(email, dateStr);
  // Find in checkinData — returns { rowObj, excelRowNum (1-based, 1=header) }
  const idx = checkinData.findIndex(r => (r.UniqueKey||'').toLowerCase() === key.toLowerCase());
  if (idx === -1) return null;
  return { rowObj: checkinData[idx], excelRowNum: idx + 2 }; // +2: 1 for header row, 1 for 0-index offset
}

// ─── AGENT VIEW ───────────────────────────────────
function renderAgentView() {
  document.getElementById('view-agent').style.display = 'block';
  document.getElementById('view-leader').style.display = 'none';

  const todayLabel = getTodayColLabel();
  const today = todayStr();
  const schedInfo = getScheduleForUser(currentUser.email, todayLabel);
  const shiftStr = schedInfo ? schedInfo.shift : 'N/A';
  const shift = parseShift(shiftStr);

  document.getElementById('agent-date').textContent = fmtDate(new Date());

  const shiftEl = document.getElementById('agent-shift');
  if (!shift) {
    shiftEl.className = 'shift-off';
    shiftEl.textContent = shiftStr || 'OFF';
  } else {
    shiftEl.className = 'shift-time';
    shiftEl.textContent = shiftStr;
  }

  // Status chip
  const ciRow = findCheckinRow(currentUser.email, today);
  const statusEl = document.getElementById('agent-status');
  if (!shift) {
    statusEl.innerHTML = `<span class="status-chip off">${shiftStr === 'PTO' ? 'PTO – Paid Time Off' : 'Day Off'}</span>`;
  } else if (ciRow) {
    const lm = parseInt(ciRow.rowObj.LateMinutes||0);
    if (ciRow.rowObj.CheckOutTime) {
      statusEl.innerHTML = `<span class="status-chip ${lm > 0 ? 'late' : 'on-time'}">${lm > 0 ? 'Late Check-in' : 'Completed Shift'}</span>`;
    } else {
      statusEl.innerHTML = `<span class="status-chip ${lm > 0 ? 'late' : 'on-time'}">${lm > 0 ? `Late by ${lm} min` : 'On Time'}</span>`;
    }
  } else {
    statusEl.innerHTML = `<span class="status-chip pending">Not Yet Checked In</span>`;
  }

  // Action card
  renderAgentAction(shift, ciRow, today);

  // Week grid
  renderWeekGrid(currentUser.email);
}

function renderAgentAction(shift, ciRow, today) {
  const el = document.getElementById('agent-action-content');

  if (!shift) {
    el.innerHTML = `
      <div style="font-size:48px;margin-bottom:8px;">🏖️</div>
      <div style="font-weight:600;color:var(--gray-500);">No shift today. Enjoy your day off!</div>`;
    return;
  }

  const timeRows = ciRow ? `
    <div class="time-row">
      <div class="time-box">
        <div class="label">Check-In</div>
        <div class="val">${ciRow.rowObj.CheckInTime || '—'}</div>
      </div>
      <div class="time-box">
        <div class="label">Check-Out</div>
        <div class="val">${ciRow.rowObj.CheckOutTime || '—'}</div>
      </div>
    </div>` : '';

  if (!ciRow) {
    el.innerHTML = `
      <div style="margin-bottom:16px;">
        <div class="label">Scheduled</div>
        <div style="font-size:20px;font-weight:700;color:var(--primary);">${shift.start} – ${shift.end}</div>
      </div>
      <button class="btn-checkin" onclick="doCheckIn('${today}', '${shift.start}', '${shift.end}')">🟢 Check In Now</button>`;
  } else if (!ciRow.rowObj.CheckOutTime) {
    el.innerHTML = `
      <div style="margin-bottom:12px;">
        <div class="label">Checked in at</div>
        <div style="font-size:20px;font-weight:700;color:var(--success);">${ciRow.rowObj.CheckInTime}</div>
      </div>
      <button class="btn-checkout" onclick="doCheckOut('${today}', ${ciRow.excelRowNum})">🔴 Check Out</button>
      ${timeRows}`;
  } else {
    el.innerHTML = `
      <div style="font-size:40px;margin-bottom:8px;">✅</div>
      <div style="font-weight:700;font-size:18px;color:var(--success);margin-bottom:12px;">Shift Completed</div>
      ${timeRows}`;
  }
}

function renderWeekGrid(email) {
  const grid = document.getElementById('agent-week-grid');
  const todayLabel = getTodayColLabel();
  const row = scheduleData.find(r => (r.Email||'').toLowerCase() === email.toLowerCase());
  if (!row) { grid.innerHTML = '<div style="color:var(--gray-500);">No schedule found.</div>'; return; }

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  grid.innerHTML = schedDateCols.map(col => {
    const shift = row[col.label] || 'OFF';
    const isToday = col.label === todayLabel;
    const isOff = shift === 'OFF' || shift === 'PTO';
    const parts = col.label.split('-');
    const dayNum = parts[0];
    // Approximate day of week from date
    const now = new Date();
    const year = now.getFullYear();
    const monthMap = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const d = new Date(year, monthMap[parts[1]] ?? 4, parseInt(dayNum));
    const dayName = dayNames[d.getDay()];
    return `
      <div class="day-cell ${isToday ? 'today' : ''} ${isOff ? 'off-day' : ''}">
        <div class="day-name">${dayName}</div>
        <div class="day-date">${dayNum}</div>
        <div class="day-shift">${shift}</div>
      </div>`;
  }).join('');
}

// ─── CHECK-IN ─────────────────────────────────────
async function doCheckIn(dateStr, shiftStart, shiftEnd) {
  const btn = document.querySelector('.btn-checkin');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const now = new Date();
    const checkInTime = fmtTime(now);
    const lateMin = calcLateMinutes(
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
      shiftStart
    );
    const status = lateMin > 0 ? 'Late' : 'On Time';
    const myRow = scheduleData.find(r => (r.Email||'').toLowerCase() === currentUser.email);
    const newRow = {
      UniqueKey: uniqueKey(currentUser.email, dateStr),
      Email: currentUser.email,
      FullName: myRow ? myRow['Full Name'] : currentUser.name,
      Date: dateStr,
      CheckInTime: checkInTime,
      CheckOutTime: '',
      ShiftStart: shiftStart,
      ShiftEnd: shiftEnd,
      ScheduleStatus: 'Scheduled',
      AttendanceStatus: status,
      LateMinutes: lateMin,
      IsAutoCheckout: false,
      LineManager: myRow ? myRow['Line Manager'] : '',
      Cluster: myRow ? myRow.Cluster : '',
      Notes: '',
      SubmittedBy: currentUser.email,
    };

    // Ensure headers match CheckIn_CheckOut sheet order
    const hdrs = ['UniqueKey','Email','FullName','Date','CheckInTime','CheckOutTime','ShiftStart','ShiftEnd','ScheduleStatus','AttendanceStatus','LateMinutes','IsAutoCheckout','LineManager','Cluster','Notes','SubmittedBy'];
    const rowVals = hdrs.map(h => newRow[h] ?? '');

    await appendRowToSheet('CheckIn_CheckOut', hdrs, rowVals);

    // Update local cache
    checkinData.push(newRow);
    showToast('✅ Checked in at ' + checkInTime, 'success');
    renderAgentView();
  } catch(e) {
    showToast('Check-in failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '🟢 Check In Now'; }
  }
}

async function doCheckOut(dateStr, excelRowNum) {
  const btn = document.querySelector('.btn-checkout');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const now = new Date();
    const checkOutTime = fmtTime(now);
    // Column F = index 6 (1-based) = CheckOutTime
    const colIdx = ['UniqueKey','Email','FullName','Date','CheckInTime','CheckOutTime'].length; // 6 = F
    await updateSheetCell('CheckIn_CheckOut', excelRowNum, colIdx, checkOutTime);

    // Update local cache
    const local = findCheckinRow(currentUser.email, dateStr);
    if (local) local.rowObj.CheckOutTime = checkOutTime;
    showToast('✅ Checked out at ' + checkOutTime, 'success');
    renderAgentView();
  } catch(e) {
    showToast('Check-out failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '🔴 Check Out'; }
  }
}

// ─── LEADER VIEW ──────────────────────────────────
let currentTab = 'today';

function setTab(tab) {
  currentTab = tab;
  document.getElementById('leader-today').style.display = tab === 'today' ? 'block' : 'none';
  document.getElementById('leader-week').style.display = tab === 'week' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'week') renderWeekTable();
}

function renderLeaderView() {
  document.getElementById('view-agent').style.display = 'none';
  document.getElementById('view-leader').style.display = 'block';

  // Populate manager filter
  const filterEl = document.getElementById('leader-filter');
  filterEl.innerHTML = '<option value="">All Teams</option>';
  if (currentUser.role === 'cluster_head') {
    // Show all line managers as filter options
    const managers = [...new Set(scheduleData.map(r => r['Line Manager']).filter(Boolean))];
    managers.sort().forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      filterEl.appendChild(opt);
    });
  } else {
    // Manager sees only their own team — lock the filter
    filterEl.value = currentUser.managerName;
    filterEl.disabled = true;
  }

  // Default date = today
  document.getElementById('leader-date').value = todayStr();

  leaderRefresh();
}

function leaderRefresh() {
  const dateStr = document.getElementById('leader-date').value || todayStr();
  const filterMgr = document.getElementById('leader-filter').value;

  // Date label for schedule column e.g. "29-May"
  const d = new Date(dateStr + 'T00:00:00');
  const dayNum = d.getDate();
  const monStr = d.toLocaleString('en-US', { month: 'short' });
  const dateLabel = `${dayNum}-${monStr}`;

  // Filter agents visible to this user
  let agents = scheduleData;
  if (currentUser.role === 'manager') {
    agents = agents.filter(r => r['Line Manager'] === currentUser.managerName);
  } else if (filterMgr) {
    agents = agents.filter(r => r['Line Manager'] === filterMgr);
  }

  // Build attendance map for selected date
  const ciMap = {};
  checkinData.forEach(r => {
    if (r.Date === dateStr) ciMap[(r.Email||'').toLowerCase()] = r;
  });

  // Compute rows
  let scheduled=0, checkedIn=0, late=0, absent=0, off=0;
  const rows = agents.map(a => {
    const shiftStr = a[dateLabel] || 'OFF';
    const shift = parseShift(shiftStr);
    const ci = ciMap[(a.Email||'').toLowerCase()];
    let status, lateMin = 0;

    if (!shift) {
      status = shiftStr === 'PTO' ? 'pto' : 'off';
      off++;
    } else {
      scheduled++;
      if (ci) {
        lateMin = parseInt(ci.LateMinutes || 0);
        if (lateMin > 0) { status = 'late'; late++; }
        else { status = 'on-time'; checkedIn++; }
        if (ci.CheckOutTime) { /* already counted */ }
      } else {
        // Check if past shift start + 30 min grace
        const now = new Date();
        const selDate = new Date(dateStr + 'T00:00:00');
        const isToday = selDate.toDateString() === now.toDateString();
        if (isToday) {
          const [sh, sm] = shift.start.split(':').map(Number);
          const shiftStartMs = new Date(dateStr + `T${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}:00`).getTime();
          if (now.getTime() > shiftStartMs + 30*60*1000) { status = 'absent'; absent++; }
          else { status = 'pending'; checkedIn++; } // not yet shift time
        } else {
          status = 'absent'; absent++;
        }
      }
    }
    return { a, shiftStr, ci, status, lateMin };
  });

  // Summary cards
  document.getElementById('leader-summary').innerHTML = `
    <div class="summary-card"><div class="num blue">${agents.length}</div><div class="lbl">Total</div></div>
    <div class="summary-card"><div class="num blue">${scheduled}</div><div class="lbl">Scheduled</div></div>
    <div class="summary-card"><div class="num green">${checkedIn}</div><div class="lbl">Checked In</div></div>
    <div class="summary-card"><div class="num yellow">${late}</div><div class="lbl">Late</div></div>
    <div class="summary-card"><div class="num red">${absent}</div><div class="lbl">Absent</div></div>`;

  // Table
  const tbody = document.getElementById('leader-table-body');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No agents found.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(({ a, shiftStr, ci, status, lateMin }) => `
    <tr>
      <td>
        <div class="td-name">${a['Full Name'] || a.Username}</div>
        <div class="td-manager">${a.EID}</div>
      </td>
      <td>${a.EID}</td>
      <td>${a['Line Manager'] || '—'}</td>
      <td>${shiftStr}</td>
      <td>${ci ? ci.CheckInTime : '—'}</td>
      <td>${ci ? (ci.CheckOutTime || '—') : '—'}</td>
      <td><span class="badge ${status}">${statusLabel(status)}</span></td>
      <td>${lateMin > 0 ? lateMin + ' min' : '—'}</td>
    </tr>`).join('');
}

function statusLabel(s) {
  const map = { 'on-time':'On Time', late:'Late', absent:'Absent', off:'Day Off', pto:'PTO', pending:'Not Yet' };
  return map[s] || s;
}

function renderWeekTable() {
  const thead = document.getElementById('week-thead');
  const tbody = document.getElementById('week-tbody');

  // Get visible agents
  let agents = scheduleData;
  if (currentUser.role === 'manager') {
    agents = agents.filter(r => r['Line Manager'] === currentUser.managerName);
  }

  // Header
  thead.innerHTML = `<tr>
    <th>Agent</th>
    <th>EID</th>
    <th>Line Manager</th>
    ${schedDateCols.map(c => `<th>${c.label}</th>`).join('')}
  </tr>`;

  tbody.innerHTML = agents.map(a => `
    <tr>
      <td class="td-name">${a['Full Name'] || a.Username}</td>
      <td>${a.EID}</td>
      <td>${a['Line Manager']}</td>
      ${schedDateCols.map(c => {
        const v = a[c.label] || 'OFF';
        const cls = v === 'OFF' ? 'off' : v === 'PTO' ? 'pto' : 'on-time';
        return `<td><span class="badge ${cls}">${v}</span></td>`;
      }).join('')}
    </tr>`).join('');
}

// ─── AUTO LOGIN (handle redirect) ─────────────────
(async function bootstrap() {
  // Only attempt silent re-auth if config is filled in
  if (CONFIG.clientId === 'YOUR_CLIENT_ID_HERE' || CONFIG.tenantId === 'YOUR_TENANT_ID_HERE') {
    showPage('login');
    return;
  }
  try {
    const inst = getMsalInstance();
    await inst.initialize();
    const result = await inst.handleRedirectPromise();
    if (result) {
      inst.setActiveAccount(result.account);
      await initApp();
      return;
    }
    const accounts = inst.getAllAccounts();
    if (accounts.length > 0) {
      inst.setActiveAccount(accounts[0]);
      await initApp();
    } else {
      showPage('login');
    }
  } catch(e) {
    showPage('login');
  }
})();
